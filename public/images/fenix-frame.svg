<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Case body with transparent display cutout (compound path, evenodd) -->
  <!-- Outer: case circle r=200, Inner: display circle r=140 -->
  <path fill-rule="evenodd" clip-rule="evenodd" fill="#1C1C1E" d="
    M 200,0 A 200,200 0 0 1 200,400 A 200,200 0 0 1 200,0 Z
    M 200,60 A 140,140 0 0 1 200,340 A 140,140 0 0 1 200,60 Z
  "/>

  <!-- Bezel inner ring -->
  <circle cx="200" cy="200" r="148" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
  <!-- Bezel outer ring -->
  <circle cx="200" cy="200" r="193" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" fill="none"/>

  <!-- Major tick marks (every 30°, 12 total) -->
  <g stroke="#888" stroke-width="2" stroke-linecap="round">
    <line x1="200" y1="8" x2="200" y2="28"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(30, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(60, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(90, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(120, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(150, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(180, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(210, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(240, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(270, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(300, 200, 200)"/>
    <line x1="200" y1="8" x2="200" y2="28" transform="rotate(330, 200, 200)"/>
  </g>

  <!-- Minor tick marks (every 6°, excluding major tick positions) -->
  <g stroke="#555" stroke-width="1" stroke-linecap="round">
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(6, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(12, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(18, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(24, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(36, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(42, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(48, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(54, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(66, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(72, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(78, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(84, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(96, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(102, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(108, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(114, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(126, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(132, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(138, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(144, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(156, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(162, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(168, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(174, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(186, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(192, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(198, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(204, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(216, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(222, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(228, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(234, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(246, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(252, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(258, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(264, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(276, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(282, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(288, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(294, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(306, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(312, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(318, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(324, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(336, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(342, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(348, 200, 200)"/>
    <line x1="200" y1="10" x2="200" y2="22" transform="rotate(354, 200, 200)"/>
  </g>

  <!-- 5 Side buttons (positioned via rotation from 12 o'clock template) -->
  <!-- Left: LIGHT (300°/10 o'clock), UP/MENU (270°/9 o'clock), DOWN (240°/8 o'clock) -->
  <!-- Right: START/STOP (60°/2 o'clock), BACK/LAP (120°/4 o'clock) -->
  <g fill="#2C2C2E">
    <!-- LIGHT button (top-left) -->
    <rect x="192" y="-4" width="16" height="30" rx="4" transform="rotate(300, 200, 200)"/>
    <!-- UP/MENU button (mid-left) -->
    <rect x="192" y="-4" width="16" height="30" rx="4" transform="rotate(270, 200, 200)"/>
    <!-- DOWN button (bottom-left) -->
    <rect x="192" y="-4" width="16" height="30" rx="4" transform="rotate(240, 200, 200)"/>
    <!-- START/STOP button with guard (top-right) -->
    <rect x="192" y="-4" width="16" height="34" rx="4" transform="rotate(60, 200, 200)"/>
    <!-- BACK/LAP button (bottom-right) -->
    <rect x="192" y="-4" width="16" height="30" rx="4" transform="rotate(120, 200, 200)"/>
  </g>

  <!-- Case edge highlight -->
  <circle cx="200" cy="200" r="199.5" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
